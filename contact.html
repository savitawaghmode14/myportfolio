<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>
<link rel="stylesheet" href="style.css">
<style>
.contact-boxes {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-top: 40px;
}
.contact-box {
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    padding: 30px 50px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    min-width: 250px;
    text-align: center;
    border: 1.5px solid #00d4ff;
    transition: transform 0.2s;
}
.contact-box:hover {
    transform: translateY(-7px) scale(1.04);
    box-shadow: 0 14px 40px rgba(0,0,0,0.23);
}
.contact-icon {
    font-size: 2.3rem;
    margin-bottom: 12px;
    display: block;
    color: #00d4ff;
}
.contact-info {
    font-size: 1.1rem;
    margin-top: 8px;
    word-break: break-all;
}
@media (max-width:600px) {
    .contact-boxes {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    .contact-box {
        min-width: 180px;
        padding: 18px 20px;
    }
}
</style>
</head>
<body>
<nav>
    <div>
        <a href="index.html">Home</a>
        <a href="academic.html">Academic Profile</a>
        <a href="Technical.html">Technical Profile</a>
        <a href="Personal.html">Personal Information</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>
<section class="page">
    <h1>Contact Me</h1>
    <div class="contact-boxes">
        <div class="contact-box">
            <span class="contact-icon">&#9993;</span>
            <div class="contact-info">
                <a 
                    href="https://mail.google.com/mail/u/0/#inbox"
                    style="color:inherit; text-decoration:underline; cursor:pointer;"
                    onclick="window.location='https://mail.google.com/mail/u/0/#inbox'; return false;"
                    title="Open your inbox to email me"
                >
                    swanandmule7@gmail.com
                </a>
            </div>
        </div>
        <div class="contact-box">
            <span class="contact-icon">&#9742;</span>
            <div class="contact-info">+919270774127</div>
        </div>
    </div>
</section>
</body>
</html>
